<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Smart IoT Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-green: #10B981;
            --dark-green: #047857;
            --accent-yellow: #F59E0B;
            --click-orange: #EA580C;
            --bg-gradient: linear-gradient(135deg, #ecfdf5 0%, #fef3c7 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-main: #1f2937;
            --text-muted: #6b7280;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Prompt', sans-serif; background: var(--bg-gradient); background-attachment: fixed; color: var(--text-main); min-height: 100vh; padding: 30px 20px; }
        .header { text-align: center; padding: 30px 20px; background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 20px; max-width: 1200px; margin: 0 auto 40px auto; box-shadow: 0 10px 30px rgba(16, 185, 129, 0.1); }
        .header h1 { font-size: 32px; font-weight: 700; color: var(--dark-green); margin-bottom: 5px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .error-msg { text-align: center; color: #b91c1c; background: #fecaca; padding: 12px; border-radius: 10px; max-width: 1200px; margin: 0 auto 20px auto; font-weight: 500; display: none; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card-bg); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.8); border-top: 5px solid var(--accent-yellow); transition: all 0.4s; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(16, 185, 129, 0.15); border-top-color: var(--primary-green); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 15px; }
        .icon-box { width: 45px; height: 45px; border-radius: 12px; background: #d1fae5; color: var(--primary-green); display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .device-name { font-size: 18px; font-weight: 700; }
        .toggle-btn { width: 100%; padding: 12px; border: none; border-radius: 12px; background: linear-gradient(135deg, #FDE047 0%, var(--accent-yellow) 100%); color: #78350f; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .toggle-btn:active { background: linear-gradient(135deg, var(--click-orange) 0%, #c2410c 100%); color: white; transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="header"><h1><i class="fa-solid fa-house-signal"></i> Smart Home Center</h1></div>
    <div id="errorMessage" class="error-msg">ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้ กำลังใช้ข้อมูลสำรอง</div>
    <div class="dashboard-grid" id="dashboardGrid"></div>
    <script>
        const fallbackData = [
            {"id": "1", "device_name": "LED1", "device_type": "LED", "pin": "13", "status": "ON", "created_at": "2026-06-30 10:16:41"},
            {"id": "2", "device_name": "LED2", "device_type": "LED", "pin": "12", "status": "OFF", "created_at": "2026-06-30 10:16:41"},
            {"id": "3", "device_name": "Temperature", "device_type": "SENSOR", "pin": "34", "status": "ACTIVE", "created_at": "2026-06-30 10:16:41"},
            {"id": "4", "device_name": "Humidity", "device_type": "SENSOR", "pin": "35", "status": "ACTIVE", "created_at": "2026-06-30 10:16:41"},
            {"id": "5", "device_name": "Soil Moisture", "device_type": "SENSOR", "pin": "36", "status": "ACTIVE", "created_at": "2026-06-30 10:16:41"}
        ];
        function renderDashboard(devices) {
            const grid = document.getElementById('dashboardGrid');
            devices.forEach(device => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="icon-box"><i class="fa-solid ${device.device_type === 'LED' ? 'fa-lightbulb' : 'fa-microchip'}"></i></div>
                        <div><span class="device-name">${device.device_name}</span></div>
                    </div>
                    <div class="card-body">
                        <p>Status: ${device.status}</p>
                        ${device.device_type === 'LED' ? `<button class="toggle-btn" onclick="alert('สถานะเปลี่ยนแล้ว!')">Toggle Power</button>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        window.onload = () => renderDashboard(fallbackData);
    </script>
</body>
</html>
